  - id: usql
    name: usql
    command: usql
    category: data-db
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, binary]
    example: usql postgres://user:pass@localhost/db
