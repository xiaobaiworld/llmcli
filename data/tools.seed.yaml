  - id: duckdb
    name: DuckDB
    command: duckdb
    category: data-db
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, apt, binary]
    example: duckdb -c "select * from 'data.parquet' limit 5"
