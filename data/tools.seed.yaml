version: v1
tools:
  - id: ripgrep
    name: ripgrep
    command: rg
    category: file-text
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [brew, apt]
    example: rg "TODO" .
    notes: Fast recursive search for code and text.

  - id: fd
    name: fd
    command: fd
    category: file-text
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [brew, apt]
    example: fd "\.md$" docs
    notes: Friendly alternative to find.

  - id: jq
    name: jq
    command: jq
    category: file-text
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [brew, apt]
    example: cat data.json | jq '.items[] | .name'
    notes: JSON query and transformation.

  - id: yq
    name: yq
    command: yq
    category: file-text
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [brew, apt]
    example: yq '.services.web.image' docker-compose.yml
    notes: YAML and JSON processing.

  - id: xsv
    name: xsv
    command: xsv
    category: file-text
    kind: traditional-cli
    priority: B
    agent_ready_level: high
    agent_ready_score: 4
    maintained: unknown
    install: [brew, binary]
    example: xsv stats data.csv
    notes: CSV processing toolkit.

  - id: sd
    name: sd
    command: sd
    category: file-text
    kind: traditional-cli
    priority: B
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, cargo]
    example: sd "foo" "bar" README.md
    notes: Intuitive find-and-replace tool.

  - id: pandoc
    name: pandoc
    command: pandoc
    category: file-text
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, apt]
    example: pandoc input.md -o output.html
    notes: Document conversion.

  - id: imagemagick
    name: ImageMagick
    command: magick
    category: file-text
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, apt]
    example: magick input.png -resize 800x output.png
    notes: Batch image manipulation.

  - id: curl
    name: curl
    command: curl
    category: http-api
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [system, brew, apt]
    example: curl -s https://example.com/api/health
    notes: Universal HTTP client.

  - id: httpie
    name: HTTPie
    command: http
    category: http-api
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, pip, apt]
    example: http GET https://example.com/api/users
    notes: Human-friendly HTTP client.

  - id: xh
    name: xh
    command: xh
    category: http-api
    kind: traditional-cli
    priority: B
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, cargo]
    example: xh GET https://example.com/api/status
    notes: Fast HTTP client inspired by HTTPie.

  - id: wget
    name: wget
    command: wget
    category: http-api
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [system, brew, apt]
    example: wget -qO- https://example.com/feed.xml
    notes: Reliable downloader.

  - id: grpcurl
    name: grpcurl
    command: grpcurl
    category: http-api
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, binary]
    example: grpcurl -plaintext localhost:50051 list
    notes: gRPC endpoint inspection and calls.

  - id: websocat
    name: websocat
    command: websocat
    category: http-api
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: unknown
    install: [brew, cargo]
    example: websocat ws://localhost:8080/socket
    notes: WebSocket CLI helper.

  - id: k6
    name: k6
    command: k6
    category: http-api
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, apt, binary]
    example: k6 run loadtest.js
    notes: API and load testing.

  - id: oha
    name: oha
    command: oha
    category: http-api
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, cargo]
    example: oha -n 1000 -c 20 https://example.com
    notes: Lightweight HTTP load testing.

  - id: sqlite3
    name: SQLite
    command: sqlite3
    category: data-db
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 5
    maintained: yes
    install: [system, brew, apt]
    example: sqlite3 app.db "select count(*) from users;"
    notes: Embedded SQL database CLI.

  - id: psql
    name: PostgreSQL Client
    command: psql
    category: data-db
    kind: traditional-cli
    priority: A
    agent_ready_level: high
    agent_ready_score: 4
    maintained: yes
    install: [brew, apt]
    example: psql "$DATABASE_URL" -c "select now();"
    notes: Postgres client shell.

  - id: mysql
    name: MySQL Client
    command: mysql
    category: data-db
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, apt]
    example: mysql -h 127.0.0.1 -u root -p
    notes: MySQL command-line client.

  - id: redis-cli
    name: Redis CLI
    command: redis-cli
    category: data-db
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
    install: [brew, apt]
    example: redis-cli ping
    notes: Redis command-line interface.

  - id: mongosh
    name: Mongo Shell
    command: mongosh
    category: data-db
    kind: traditional-cli
    priority: B
    agent_ready_level: medium
    agent_ready_score: 3
    maintained: yes
