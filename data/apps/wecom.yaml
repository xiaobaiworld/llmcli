id: wecom
name: 企业微信
description: 腾讯出品的企业通讯与协作平台，深度整合微信生态。
homepage: https://work.weixin.qq.com
category: enterprise-collab

tools:
  - id: wecom-cli
    name: wecom-cli
    type: cli
    install_cmd: "pip install wecom-cli"
    repo: https://github.com/sbzhu/weworkapi_python
    maintained: community

  - id: wecom-mcp
    name: wecom-mcp（社区）
    type: mcp
    install_cmd: "npx wecom-mcp-server"
    repo: https://github.com/cnych/wecom-mcp
    maintained: community

domains:
  - id: messenger
    name: 消息
    features:
      - id: send-text-to-user
        name: 发送文字消息给用户
        status: supported
        tool_id: wecom-cli
        command: "wecom message send --to-user wangwu --content 'Hello'"
        input: |
          --to-user: 成员账号（userid）
          --content: 消息文字内容
        output: |
          { "errcode": 0, "errmsg": "ok", "msgid": "xxx" }

      - id: send-to-group
        name: 发送消息到应用消息群
        status: supported
        tool_id: wecom-cli
        command: "wecom message send --to-party finance --content '请查收月报'"
        input: "--to-party: 部门 ID"
        output: '{ "errcode": 0, "errmsg": "ok" }'
        notes: "需开通应用消息权限，receiver 可同时指定 user/party/tag"

      - id: send-markdown
        name: 发送 Markdown 消息
        status: supported
        tool_id: wecom-cli
        command: "wecom message send --to-user wangwu --type markdown --content '# 标题\n**加粗**'"
        output: '{ "errcode": 0, "errmsg": "ok" }'

      - id: recall-message
        name: 撤回消息
        status: unsupported
        gap_reason: "企业微信应用消息 API 不支持撤回"

      - id: get-message-audit
        name: 获取消息审计记录
        status: partial
        tool_id: wecom-cli
        notes: "需开通「会话内容存档」特殊权限，普通应用无法访问"
        gap_reason: "会话存档需单独申请，合规限制较多"

  - id: calendar
    name: 日历
    features:
      - id: create-event
        name: 创建日程
        status: supported
        tool_id: wecom-mcp
        command: "mcp call calendar.add_schedule summary='周会' start='2026-01-10T10:00:00' end='2026-01-10T11:00:00'"
        input: |
          summary: 日程标题
          start / end: ISO 8601 时间
        output: '{ "schedule_id": "xxx" }'

      - id: list-events
        name: 查询日程列表
        status: supported
        tool_id: wecom-mcp
        command: "mcp call calendar.get_schedule_list start='2026-01-10T00:00:00' end='2026-01-10T23:59:59'"
        output: '{ "schedule_list": [...] }'

      - id: delete-event
        name: 删除日程
        status: supported
        tool_id: wecom-mcp
        command: "mcp call calendar.delete_schedule schedule_id=xxx"
        output: '{ "errcode": 0 }'

      - id: sync-calendar
        name: 同步到个人微信日历
        status: unsupported
        gap_reason: "企业日历与个人微信日历相互独立，API 无同步接口"

  - id: docs
    name: 文档（腾讯文档）
    features:
      - id: create-doc
        name: 创建文档
        status: partial
        tool_id: wecom-mcp
        command: "mcp call wedoc.create_doc title='会议纪要'"
        output: '{ "url": "https://doc.weixin.qq.com/..." }'
        notes: "创建后返回链接，文档内容编辑 API 覆盖有限"
        gap_reason: "块级编辑 API 处于 Beta，功能不完整"

      - id: read-doc
        name: 读取文档内容
        status: partial
        tool_id: wecom-mcp
        command: "mcp call wedoc.get_doc_base_info docid=xxx"
        notes: "仅返回元数据，正文内容需通过独立接口获取且格式受限"
        gap_reason: "全文内容导出不如飞书完整"

      - id: share-doc
        name: 分享文档给成员
        status: supported
        tool_id: wecom-mcp
        command: "mcp call wedoc.set_doc_share_config docid=xxx auth_type=1 user_list='[\"wangwu\"]'"
        output: '{ "errcode": 0 }'

      - id: doc-version-history
        name: 查看文档版本历史
        status: unsupported
        gap_reason: "腾讯文档版本历史仅 GUI 可查，API 未开放"

  - id: smartsheet
    name: 智能表格
    features:
      - id: create-smartsheet
        name: 创建智能表格
        status: supported
        tool_id: wecom-mcp
        command: "mcp call wedoc.create_doc doctype=smartsheet title='项目追踪'"
        output: '{ "url": "https://doc.weixin.qq.com/sheet/..." }'

      - id: add-record
        name: 添加行记录
        status: supported
        tool_id: wecom-mcp
        command: "mcp call wedoc.smartsheet.add_records sheet_id=xxx records='[{\"title\":\"Task 1\",\"status\":\"进行中\"}]'"
        output: '{ "record_ids": ["recXxx"] }'

      - id: query-records
        name: 查询记录（过滤）
        status: partial
        tool_id: wecom-mcp
        command: "mcp call wedoc.smartsheet.get_records sheet_id=xxx"
        notes: "可获取全量记录，过滤条件支持有限"
        gap_reason: "过滤表达式语法简单，复杂条件需客户端处理"

      - id: delete-record
        name: 删除记录
        status: supported
        tool_id: wecom-mcp
        command: "mcp call wedoc.smartsheet.delete_records sheet_id=xxx record_ids='[\"recXxx\"]'"
        output: '{ "errcode": 0 }'

  - id: meeting
    name: 腾讯会议（整合版）
    features:
      - id: create-meeting
        name: 预约会议
        status: supported
        tool_id: wecom-mcp
        command: "mcp call meeting.create subject='Q1 复盘' start_time=1735200000 end_time=1735203600"
        output: '{ "meeting_id": "xxx", "join_url": "https://meeting.tencent.com/..." }'

      - id: cancel-meeting
        name: 取消会议
        status: supported
        tool_id: wecom-mcp
        command: "mcp call meeting.cancel meeting_id=xxx reason='时间冲突'"
        output: '{ "errcode": 0 }'

      - id: get-participants
        name: 获取参会人列表
        status: supported
        tool_id: wecom-mcp
        command: "mcp call meeting.get_participants meeting_id=xxx"
        output: '{ "participants": [...] }'

      - id: cloud-recording
        name: 获取云录制链接
        status: partial
        tool_id: wecom-mcp
        notes: "录制完成后可获取下载链接，但 AI 摘要仅限 GUI"
        gap_reason: "录制转写文本不通过 API 开放"

  - id: todo
    name: 待办
    features:
      - id: create-todo
        name: 创建待办
        status: supported
        tool_id: wecom-cli
        command: "wecom todo create --title '提交周报' --due '2026-01-10'"
        input: |
          --title: 待办标题
          --due: 截止日期（YYYY-MM-DD）
        output: '{ "todo_id": "xxx" }'

      - id: complete-todo
        name: 完成待办
        status: supported
        tool_id: wecom-cli
        command: "wecom todo complete --id xxx"
        output: '{ "errcode": 0 }'

      - id: list-todos
        name: 查询待办列表
        status: supported
        tool_id: wecom-cli
        command: "wecom todo list --status pending"
        output: '{ "todo_list": [...] }'

      - id: assign-todo
        name: 指派待办给他人
        status: unsupported
        gap_reason: "待办 API 仅支持操作自己的待办，无法代他人创建"

  - id: contacts
    name: 通讯录
    features:
      - id: get-user-info
        name: 查询用户信息
        status: supported
        tool_id: wecom-cli
        command: "wecom user get --userid wangwu"
        input: "--userid: 企业内成员账号"
        output: '{ "userid": "wangwu", "name": "王五", "department": [2], "email": "..." }'

      - id: list-department-users
        name: 获取部门成员列表
        status: supported
        tool_id: wecom-cli
        command: "wecom user list --department-id 2"
        output: '{ "userlist": [...] }'

      - id: create-user
        name: 创建成员
        status: supported
        tool_id: wecom-cli
        command: "wecom user create --userid newuser --name '张三' --department 2"
        output: '{ "errcode": 0 }'
        notes: "需要通讯录写权限"

      - id: sync-from-hr
        name: 从 HR 系统批量同步
        status: unsupported
        gap_reason: "需自行实现 ETL 脚本，企业微信不提供内置同步工具"
